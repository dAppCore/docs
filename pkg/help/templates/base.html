<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}Help{{end}}</title>
    <style>
        :root {
            --bg: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --fg: #c9d1d9;
            --fg-muted: #8b949e;
            --fg-subtle: #6e7681;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --border: #30363d;
            --success: #3fb950;
            --warning: #d29922;
            --danger: #f85149;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, 'DejaVu Sans Mono', monospace;
            background: var(--bg);
            color: var(--fg);
            line-height: 1.6;
            font-size: 14px;
        }
        a { color: var(--accent); text-decoration: none; }
        a:hover { color: var(--accent-hover); text-decoration: underline; }
        .container { max-width: 960px; margin: 0 auto; padding: 0 1.5rem; }
        nav {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 0;
        }
        nav .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }
        nav .brand {
            font-weight: bold;
            font-size: 1rem;
            color: var(--fg);
            white-space: nowrap;
        }
        nav .brand:hover { color: var(--accent); text-decoration: none; }
        .search-form { display: flex; flex: 1; max-width: 400px; }
        .search-form input {
            flex: 1;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--fg);
            padding: 0.4rem 0.75rem;
            font-family: inherit;
            font-size: 0.85rem;
        }
        .search-form input::placeholder { color: var(--fg-subtle); }
        .search-form input:focus { outline: none; border-color: var(--accent); }
        main { padding: 2rem 0; min-height: calc(100vh - 120px); }
        footer {
            border-top: 1px solid var(--border);
            padding: 1rem 0;
            text-align: center;
            color: var(--fg-muted);
            font-size: 0.8rem;
        }
        h1, h2, h3, h4, h5, h6 {
            color: var(--fg);
            margin: 1.5rem 0 0.75rem;
            line-height: 1.3;
        }
        h1 { font-size: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
        h2 { font-size: 1.25rem; }
        h3 { font-size: 1.1rem; }
        p { margin: 0.5rem 0; }
        pre {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            overflow-x: auto;
            margin: 0.75rem 0;
        }
        code {
            background: var(--bg-tertiary);
            padding: 0.15rem 0.3rem;
            border-radius: 3px;
            font-size: 0.9em;
        }
        pre code { background: none; padding: 0; }
        table {
            border-collapse: collapse;
            width: 100%;
            margin: 0.75rem 0;
        }
        th, td {
            border: 1px solid var(--border);
            padding: 0.5rem 0.75rem;
            text-align: left;
        }
        th { background: var(--bg-secondary); font-weight: 600; }
        ul, ol { padding-left: 1.5rem; margin: 0.5rem 0; }
        li { margin: 0.25rem 0; }
        .tag {
            display: inline-block;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.1rem 0.5rem;
            font-size: 0.75rem;
            color: var(--accent);
            margin: 0.15rem 0.15rem;
        }
        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem 1.25rem;
            margin: 0.75rem 0;
            transition: border-color 0.15s;
        }
        .card:hover { border-color: var(--accent); }
        .card h3 { margin-top: 0; font-size: 1rem; }
        .card p { color: var(--fg-muted); font-size: 0.85rem; }
        .badge {
            display: inline-block;
            background: var(--bg-tertiary);
            border-radius: 10px;
            padding: 0.1rem 0.5rem;
            font-size: 0.7rem;
            color: var(--fg-muted);
        }
    </style>
    {{block "head" .}}{{end}}
</head>
<body>
    <nav>
        <div class="container">
            <a href="/" class="brand">core help</a>
            <form class="search-form" action="/search" method="get">
                <input type="text" name="q" placeholder="Search topics..." value="{{block "search_value" .}}{{end}}" autocomplete="off">
            </form>
        </div>
    </nav>
    <main>
        <div class="container">
            {{block "content" .}}{{end}}
        </div>
    </main>
    <footer>
        <div class="container">
            go-help &middot; forge.lthn.ai/core/go-help
        </div>
    </footer>
</body>
</html>
