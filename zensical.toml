[project.theme]
features = [
  "navigation.tabs",
  "navigation.sections",
  "navigation.indexes",
  "navigation.prune",
  "navigation.path",
  "navigation.tracking",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.instant.progress",
  "navigation.top",
  "toc.follow",
  "search.suggest",
  "search.highlight",
  "content.code.copy",
  "content.code.annotate",
]

[[project.theme.palette]]
scheme = "slate"
primary = "indigo"
accent = "blue"
toggle_icon = "material/brightness-7"
toggle_name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "blue"
toggle_icon = "material/brightness-4"
toggle_name = "Switch to dark mode"

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

[project.plugins]
search = {}

[project.markdown_extensions]
admonition = {}
footnotes = {}
attr_list = {}
md_in_html = {}

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions."pymdownx.details"]

[project.markdown_extensions."pymdownx.superfences"]
custom_fences = [
  {name = "mermaid", class = "mermaid", format_name = "fence_code_format"},
]

[project.markdown_extensions."pymdownx.highlight"]
anchor_linenums = true

[project.markdown_extensions."pymdownx.inlinehilite"]

[project.markdown_extensions."pymdownx.tabbed"]
alternate_style = true

[project.markdown_extensions."pymdownx.snippets"]
